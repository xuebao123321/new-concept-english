<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0F172A"/>
  <g transform="translate(50, 50)">
    <!-- rocket body -->
    <ellipse cx="0" cy="5" rx="16" ry="22" fill="#22D3EE" opacity="0.9"/>
    <!-- rocket nose -->
    <polygon points="0,-22 -12,0 12,0" fill="#FBBF24"/>
    <!-- window -->
    <circle cx="0" cy="2" r="6" fill="#0F172A"/>
    <circle cx="0" cy="2" r="5" fill="#22D3EE" opacity="0.6"/>
    <!-- fins -->
    <polygon points="-16,10 -24,24 -14,18" fill="#FBBF24"/>
    <polygon points="16,10 24,24 14,18" fill="#FBBF24"/>
    <!-- flame -->
    <polygon points="-8,24 0,40 8,24" fill="#FBBF24" opacity="0.7"/>
    <!-- flame inner -->
    <polygon points="-4,26 0,36 4,26" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>
